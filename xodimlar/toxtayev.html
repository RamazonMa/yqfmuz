<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toxtayev Jasur Talatovich - YQFM</title>
    <link rel="icon" href="uzb-gerb.jpg" type="image/jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --uz-blue: #0099b5;
            --slate: #3a4750;
            --brand: #004051;
            --text-dark: #1a2733;
            --text-muted: #8a97a3;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 24px;
            background: linear-gradient(160deg, #eef5f7 0%, #e9eef1 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .business-card {
            width: 420px;
            max-width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0, 64, 81, 0.15);
            overflow: hidden;
            position: relative;
        }

        .lang-toggle {
            position: absolute;
            top: 14px;
            right: 16px;
            z-index: 5;
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.55);
            color: #fff;
            font-family: inherit;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.5px;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: background 0.2s ease;
        }

        .lang-toggle:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .card-header {
            height: 110px;
            background: linear-gradient(120deg, var(--uz-blue) 0%, #1789a8 45%, var(--slate) 100%);
            position: relative;
        }

        .card-header::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 85% 20%, rgba(255, 255, 255, 0.18) 0%, transparent 45%),
                radial-gradient(circle at 10% 90%, rgba(255, 255, 255, 0.12) 0%, transparent 40%);
        }

        .org-logo {
            position: absolute;
            top: 14px;
            left: 18px;
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
        }

        .org-logo img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.7);
            object-fit: cover;
            background: #fff;
            display: block;
        }

        .org-logo span {
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 1.5px;
        }

        .avatar-wrap {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: #ffffff;
            padding: 5px;
            box-shadow: 0 10px 30px rgba(0, 64, 81, 0.2);
        }

        .avatar-wrap img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        .avatar-fallback {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #d7eef2 0%, #e6e9ec 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--uz-blue);
            font-size: 56px;
        }

        .card-body {
            padding: 80px 30px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .name {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-dark);
            text-align: center;
            line-height: 1.3;
            margin: 0 0 8px;
        }

        .position {
            font-size: 13px;
            font-weight: 600;
            color: var(--brand);
            text-align: center;
            margin-bottom: 12px;
        }

        .org-badge {
            display: inline-block;
            background: rgba(0, 153, 181, 0.1);
            color: var(--uz-blue);
            padding: 7px 16px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            margin-bottom: 26px;
        }

        .contacts {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .contact-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 16px;
            border-radius: 14px;
            background: #f6f9fa;
            border: 1px solid #eef2f4;
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .contact-row:hover {
            background: #eaf6f8;
            border-color: #d6eef2;
            transform: translateX(4px);
            box-shadow: 0 4px 14px rgba(0, 153, 181, 0.12);
        }

        .icon-circle {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--uz-blue), var(--brand));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .contact-text {
            font-size: 13.5px;
            font-weight: 500;
            color: var(--text-dark);
            line-height: 1.4;
            word-break: break-word;
        }

        .contact-label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 2px;
        }

        @media (max-width: 480px) {
            body {
                padding: 0;
            }

            .business-card {
                border-radius: 0;
                min-height: 100vh;
            }
        }

        /* Print optimization */
        @media print {
            body {
                background: white;
                padding: 0;
            }

            .business-card {
                box-shadow: none;
                border: 1px solid #ddd;
                width: 3.5in;
            }

            .lang-toggle {
                display: none;
            }

            .card-header {
                height: 60px;
            }

            .avatar-wrap {
                width: 80px;
                height: 80px;
                top: 30px;
            }

            .card-body {
                padding: 50px 20px 20px;
            }

            .name {
                font-size: 16px;
                margin-bottom: 6px;
            }

            .org-badge {
                font-size: 9px;
                margin-bottom: 14px;
            }

            .contact-row {
                padding: 8px 10px;
            }

            .icon-circle {
                width: 28px;
                height: 28px;
                font-size: 12px;
                border-radius: 8px;
            }

            .contact-text {
                font-size: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="business-card">
        <div class="card-header">
            <button class="lang-toggle" id="langBtn" onclick="toggleLang()">EN</button>
            <div class="org-logo">
                <img src="11.png" alt="YQFM">
                <span>YQFM</span>
            </div>
            <div class="avatar-wrap">
                <img src="uzb-gerb.jpg" alt="O'zbekiston Davlat gerbi"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="avatar-fallback" style="display:none;">
                    <i class="fa fa-user" aria-hidden="true"></i>
                </div>
            </div>
        </div>

        <div class="card-body">
            <h1 class="name" data-uz="Toxtayev Jasur Talatovich" data-en="Tokhtayev Jasur Talatovich">Toxtayev Jasur Talatovich</h1>
            <div class="position" data-uz="Direktor o'rinbosari" data-en="Deputy Director">Direktor o'rinbosari</div>
            <span class="org-badge" data-uz="&quot;Yer qa'ridan foydalanish markazi&quot; DM" data-en="Subsoil Resources Use Center, State Institution">"Yer qa'ridan foydalanish markazi" DM</span>

            <div class="contacts">
                <a class="contact-row" href="https://yandex.uz/maps/10335/tashkent/house/YkAYdQNhTEcEQFprfX91c35kZw==/?ll=69.341523%2C41.342273&z=17.12" target="_blank" rel="noopener">
                    <span class="icon-circle"><i class="fa fa-map-marker" aria-hidden="true"></i></span>
                    <span class="contact-text">
                        <span class="contact-label" data-uz="Manzil" data-en="Address">Manzil</span>
                        <span data-uz="Toshkent, Mirzo Ulug'bek tumani, Olimlar 49" data-en="Tashkent, Mirzo Ulugbek district, Olimlar 49">Toshkent, Mirzo Ulug'bek tumani, Olimlar 49</span>
                    </span>
                </a>

                <a class="contact-row" href="tel:+998712081356">
                    <span class="icon-circle"><i class="fa fa-phone" aria-hidden="true"></i></span>
                    <span class="contact-text">
                        <span class="contact-label" data-uz="Ish telefoni" data-en="Office phone">Ish telefoni</span>
                        <span>+998 (71) 208-13-56 (104)</span>
                    </span>
                </a>

                <a class="contact-row" href="tel:+998901884798">
                    <span class="icon-circle"><i class="fa fa-mobile" aria-hidden="true" style="font-size:20px;"></i></span>
                    <span class="contact-text">
                        <span class="contact-label" data-uz="Mobil telefon" data-en="Mobile phone">Mobil telefon</span>
                        <span>+998 90 188-47-98</span>
                    </span>
                </a>

                <a class="contact-row" href="mailto:jtoxtayev@yqfm.uz">
                    <span class="icon-circle"><i class="fa fa-envelope" aria-hidden="true"></i></span>
                    <span class="contact-text">
                        <span class="contact-label" data-uz="Email" data-en="Email">Email</span>
                        <span>jtoxtayev@yqfm.uz</span>
                    </span>
                </a>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'uz';

        function toggleLang() {
            currentLang = currentLang === 'uz' ? 'en' : 'uz';
            document.documentElement.lang = currentLang;
            document.querySelectorAll('[data-uz]').forEach(function (el) {
                el.textContent = el.getAttribute(currentLang === 'uz' ? 'data-uz' : 'data-en');
            });
            document.getElementById('langBtn').textContent = currentLang === 'uz' ? 'EN' : 'UZ';
        }
    </script>
</body>

</html>
